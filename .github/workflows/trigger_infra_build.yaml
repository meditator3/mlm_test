name: Deploy Infrastructure 

on:
  workflow_run:
    workflows: ["CI"]
    types:
        - completed
    branches:
        - master
jobs:
    deploy:
      if: ${{ github.event.workflow_run.conclusion == 'success' }}
      runs-on: ubuntu-latest
      permissions: 
        contents: write
      steps:
        - name: Checkout repository
          uses: peter-evans/repository-dispatch@v4
          with:
            token: ${{ secrets.GH_TOKEN}}
            repository: meditator3/trigger_tf_mlm
            event-type: dispatch_tf
            client_payload: '{ "service": "mlm_test", "revision": "${{ github.sha }}"}'
            
        - name: Just show dispatch worked
          run: |
            echo "dispatch sent to other repo"


